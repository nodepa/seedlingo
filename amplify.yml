version: 1
applications:
  - appRoot: app
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install $(node -e "process.stdout.write(require('./package.json').volta.node)")
            - node --version
            - npm install -g npm@$(node -e "process.stdout.write(require('./package.json').volta.npm)")
            - npm --version
            - npm install
            - npm run setup
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    test:
      phases:
        preTest:
          commands:
            - nvm install $(node -e "process.stdout.write(require('./package.json').volta.node)")
            - node --version
            - npm install -g npm@$(node -e "process.stdout.write(require('./package.json').volta.npm)")
            - npm --version
            - npm install
            - npm run setup
        test:
          commands:
            - npm run test:unit:ci
            - npm run test:e2e:ci
        postTest:
          commands:
            - npx mochawesome-merge tests/e2e/report/mochawesome-report/mochawesome*.json -o  tests/e2e/report/mochawesome.json
      artifacts:
        baseDirectory: tests/e2e
        configFilePath: '**/mochawesome.json'
        files:
          - '**/*.png'
          - '**/*.mp4'
      cache:
        paths:
          - node_modules/**/*
  - appRoot: editor
    backend:
      phases:
        preBuild:
          commands:
            - nvm install $(node -e "process.stdout.write(require('./package.json').volta.node)")
            - node --version
            - npm install -g npm@$(node -e "process.stdout.write(require('./package.json').volta.npm)")
            - npm --version
        build:
          commands:
            - npm ci --cache .npm --prefer-offline
            - npm run setup
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
      cache:
        paths:
          - .npm/**/*
          - node_modules/**/*
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install $(node -e "process.stdout.write(require('./package.json').volta.node)")
            - node --version
            - npm install -g npm@$(node -e "process.stdout.write(require('./package.json').volta.npm)")
            - npm --version
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
