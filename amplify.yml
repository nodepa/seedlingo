version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    test:
      artifacts:
        baseDirectory: tests/e2e
        configFilePath: '**/mochawesome.json'
        files:
          - '**/*.png'
          - '**/*.mp4'
      phases:
        preTest:
          commands:
            - npm install
        test:
          commands:
            - npm run test:unit:ci
            - npm run test:e2e:ci
        postTest:
          commands:
            - npx mochawesome-merge tests/e2e/report/mochawesome-report/mochawesome*.json -o  tests/e2e/report/mochawesome.json
      cache:
        paths:
          - node_modules/**/*
    appRoot: app

